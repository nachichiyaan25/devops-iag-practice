
services:
  
  web:
    build: .
    container_name: django__app
    command: sh -c "while ! nc -z db 5432; do sleep 1; done; python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
    env_file:
      - .env


  db:
    image: postgres:15
    container_name: postgres__db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB : devops__db
      POSTGRES_USER : postgress
      POSTGRES_PASSWORD : postgress
    volumes:
      - postgres__data:/var/lib/postgresql/data


volumes:
  postgres__data: